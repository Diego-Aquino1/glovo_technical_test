server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy de las llamadas a la API hacia el api-gateway interno
    # El frontend usa rutas relativas /api/* → evita exponer la URL del gateway al cliente
    location /api/ {
        proxy_pass         http://api-gateway:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # El agente puede tardar hasta 90s en responder consultas complejas
        proxy_connect_timeout  10s;
        proxy_read_timeout    120s;
        proxy_send_timeout     30s;
    }

    # Servir archivos estáticos
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip para mejor rendimiento
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
